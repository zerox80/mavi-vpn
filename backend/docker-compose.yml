services:
  vpn-server:
    build:
      context: ..
      dockerfile: Dockerfile
    image: mavi-vpn-server
    container_name: mavi-vpn
    restart: unless-stopped
    privileged: true
    network_mode: host # Direct host networking for native IPv6 support
    cap_add:
      - NET_ADMIN # Required for TUN device creation & iptables
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ./data:/app/data # Persist internal state
      - /etc/letsencrypt:/etc/letsencrypt # Let's Encrypt certs (rw for cert_pin.txt)
    env_file: .env
    environment:
      - RUST_LOG=${RUST_LOG:-info}
    healthcheck:
      test: ["CMD-SHELL", "ip addr show tun0 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Traefik Reverse Proxy
  traefik:
    image: traefik:v2.11
    profiles: ["traefik"] # OPTIONAL: Only starts if --profile traefik is used
    container_name: traefik
    command:
      # Enable Docker provider
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      # Entry points
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.forwardedHeaders.insecure=true"
      - "--entrypoints.websecure.address=:443"
      # (REMOVED) Global HTTP -> HTTPS Redirect (Nginx handles SSL)
      # Let's Encrypt Resolver
      - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      - "--certificatesresolvers.myresolver.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
      # Logging
      - "--log.level=INFO"
    ports:
      - "127.0.0.1:${TRAEFIK_HTTP_PORT:-80}:80"
      - "127.0.0.1:${TRAEFIK_HTTPS_PORT:-443}:443"
      # Dashboard (Optional, insecure unless protected)
      # - "8080:8080"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./letsencrypt:/letsencrypt"

  # Demo Web Server (Whoami)
  # Replace this with your actual web content (e.g., nginx) later
  web-server:
    image: traefik/whoami
    profiles: ["traefik"] # OPTIONAL
    container_name: web-server
    labels:
      - "traefik.enable=true"
      # Router for HTTP (Nginx handles SSL)
      - "traefik.http.routers.web-server.rule=Host(`${DOMAIN_NAME}`)"
      - "traefik.http.routers.web-server.entrypoints=web"
      # (REMOVED) Internal ACME TLS Config
