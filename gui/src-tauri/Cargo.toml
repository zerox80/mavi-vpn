[package]
name = "mavi-vpn-gui"
version = "0.1.0"
edition = "2021"

[lib]
name = "mavi_vpn_gui_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
shared = { path = "../../shared" }
tauri = { version = "2", features = ["tray-icon"] }
tauri-plugin-shell = "2"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.0", features = ["full"] }
bincode = { package = "bincode-next", version = "3.0.0-rc.2", features = ["serde"] }
anyhow = "1.0"
rand = "0.8"
sha2 = "0.11"
base64 = "0.22"
url = "2"
reqwest = { version = "0.13", features = ["json", "rustls", "form"], default-features = false }
webbrowser = "1.0"

[target.'cfg(target_os = "windows")'.dependencies]
windows-sys = { version = "0.59", features = ["Win32_UI_Shell", "Win32_UI_WindowsAndMessaging", "Win32_Foundation"] }

[profile.release]
lto = true
codegen-units = 1
panic = "abort"
strip = true
