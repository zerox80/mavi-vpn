name: Tests

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            cmake \
            pkg-config \
            libglib2.0-dev \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev
      - name: Test shared crate
        run: cargo test -p shared --verbose
      - name: Test android crate
        run: cargo test -p mavivpn --verbose
      - name: Test backend
        run: cargo test -p mavi-vpn --verbose
      - name: Test linux client
        run: cargo test -p linux-vpn --verbose
      - name: Test quic-tester
        run: cargo test -p quic-tester --verbose
      - name: Setup Node.js for Tauri frontend
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: gui/package-lock.json
      - name: Build Tauri frontend assets
        working-directory: gui
        run: |
          npm ci
          npm run build
      - name: Test GUI backend
        run: cargo test -p mavi-vpn-gui --verbose

  coverage-rust:
    name: Rust Coverage
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-coverage-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-coverage-
            ${{ runner.os }}-cargo-
      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            cmake \
            pkg-config \
            libglib2.0-dev \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev
      - name: Setup Node.js for Tauri frontend
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: gui/package-lock.json
      - name: Build Tauri frontend assets
        working-directory: gui
        run: |
          npm ci
          npm run build
      - name: Generate Rust coverage summary
        run: |
          mkdir -p target/coverage

          ALL_RUST_PACKAGES="-p shared -p mavivpn -p mavi-vpn -p linux-vpn -p quic-tester -p mavi-vpn-gui"
          CORE_COVERAGE_PACKAGES="-p shared -p mavi-vpn"
          CORE_COVERAGE_IGNORE="(^|/)backend/src/(main\.rs|utils\.rs|network/h3_quinn/.*)$"

          # Gate the unit-testable Rust core. Platform clients, FFI boundaries,
          # binaries, and runtime glue remain visible in the full LCOV report.
          cargo llvm-cov --all-features $CORE_COVERAGE_PACKAGES --ignore-filename-regex "$CORE_COVERAGE_IGNORE" --summary-only --fail-under-lines 70
          cargo llvm-cov --all-features $ALL_RUST_PACKAGES --lcov --output-path target/coverage/lcov.info
      - name: Upload Rust coverage
        uses: actions/upload-artifact@v4
        with:
          name: rust-coverage
          path: target/coverage/lcov.info

  test-windows:
    name: Windows Unit Tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: Test windows crate
        run: cargo test -p windows-vpn --verbose

  test-gui:
    name: GUI Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gui
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: gui/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run frontend tests
        run: npm test
      - name: Run frontend coverage
        run: npm run test:coverage
      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: gui/coverage/

  test-android-jvm:
    name: Android JVM Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - name: Run Android JVM tests
        run: |
          chmod +x gradlew
          ./gradlew testDebugUnitTest jacocoDebugUnitTestReport
      - name: Upload Android JVM coverage
        uses: actions/upload-artifact@v4
        with:
          name: android-jvm-coverage
          path: android/app/build/reports/jacoco/
