<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="shieldGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d3a8a"/>
    </linearGradient>
    <linearGradient id="eyeGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#bfdbfe"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Shield body with cat ears integrated -->
  <path d="
    M118 16
    L192 138
    Q256 96 320 138
    L394 16
    L440 108
    L440 300
    Q440 438 256 496
    Q72 438 72 300
    L72 108
    Z
  " fill="url(#shieldGrad)" filter="url(#shadow)"/>

  <!-- Shield border glow -->
  <path d="
    M118 16
    L192 138
    Q256 96 320 138
    L394 16
    L440 108
    L440 300
    Q440 438 256 496
    Q72 438 72 300
    L72 108
    Z
  " fill="none" stroke="#60a5fa" stroke-width="4" opacity="0.35"/>

  <!-- Inner ear shading -->
  <path d="M140 46 L190 138 L156 104 Z" fill="#1e40af" opacity="0.5"/>
  <path d="M372 46 L322 138 L356 104 Z" fill="#1e40af" opacity="0.5"/>

  <!-- Subtle face area -->
  <ellipse cx="256" cy="316" rx="140" ry="128" fill="#1e3a8a" opacity="0.3"/>

  <!-- Glowing eyes -->
  <g filter="url(#glow)">
    <!-- Left eye -->
    <path d="M130 264 Q196 212 256 264 Q196 316 130 264 Z" fill="url(#eyeGrad)"/>
    <!-- Right eye -->
    <path d="M256 264 Q316 212 382 264 Q316 316 256 264 Z" fill="url(#eyeGrad)"/>
  </g>

  <!-- Vertical slit pupils -->
  <path d="M188 240 Q196 230 204 240 L204 288 Q196 298 188 288 Z" fill="#0c1629"/>
  <path d="M308 240 Q316 230 324 240 L324 288 Q316 298 308 288 Z" fill="#0c1629"/>

  <!-- Eye highlights -->
  <circle cx="210" cy="248" r="7" fill="white" opacity="0.8"/>
  <circle cx="330" cy="248" r="7" fill="white" opacity="0.8"/>
  <circle cx="192" cy="276" r="3.5" fill="white" opacity="0.35"/>
  <circle cx="312" cy="276" r="3.5" fill="white" opacity="0.35"/>

  <!-- Nose -->
  <path d="M246 354 Q256 344 266 354 L256 368 Z" fill="#93c5fd" opacity="0.7"/>

  <!-- Mouth -->
  <path d="M256 368 Q242 386 228 380" fill="none" stroke="#93c5fd" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  <path d="M256 368 Q270 386 284 380" fill="none" stroke="#93c5fd" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>

  <!-- Whiskers -->
  <g stroke="#93c5fd" stroke-width="2" stroke-linecap="round" opacity="0.25">
    <line x1="86" y1="318" x2="160" y2="332"/>
    <line x1="80" y1="352" x2="158" y2="352"/>
    <line x1="86" y1="386" x2="160" y2="372"/>
    <line x1="426" y1="318" x2="352" y2="332"/>
    <line x1="432" y1="352" x2="354" y2="352"/>
    <line x1="426" y1="386" x2="352" y2="372"/>
  </g>
</svg>
