# This is a sample Nginx reverse proxy configuration for Keycloak/Traefik.
# Use this on your host if you have an existing Nginx handling Wildcard SSL.

server {
    listen 80;
    server_name auth.example.com; # Change to your domain

    # Redirect all HTTP requests to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name auth.example.com; # Change to your domain

    # Specify your SSL certificates (e.g. Let's Encrypt Wildcard)
    ssl_certificate /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;

    # Proxy to Traefik on port 11443 (as configured in .env)
    location / {
        proxy_pass https://127.0.0.1:11443;
        proxy_ssl_verify off; # Traefik uses a self-signed cert internally if ACME is off

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Host $host;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
