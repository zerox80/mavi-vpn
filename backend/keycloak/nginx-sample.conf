# This is a sample Nginx reverse proxy configuration for Keycloak.
# Use this if you are NOT using the integrated Traefik proxy.
# Ensure that in keycloak/docker-compose.yml, you uncomment the 'ports' section to expose 8080 to 127.0.0.1.

server {
    listen 80;
    server_name auth.example.com; # Change to your domain

    # Redirect all HTTP requests to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name auth.example.com; # Change to your domain

    # Specify your SSL certificates
    ssl_certificate /path/to/your/fullchain.pem;
    ssl_certificate_key /path/to/your/privkey.pem;

    # Important headers for Keycloak to know the original requesting details
    location / {
        proxy_pass http://127.0.0.1:8080; # Points to the exposed port of Keycloak
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Host $host;
    }
}
