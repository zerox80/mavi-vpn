[package]
name = "shared"
version = "0.1.0"
edition = "2021"
description = "Mavi VPN Shared Library"
license = "MIT"
repository = "https://github.com/zerox80/mavi-vpn"
readme = "../README.md"
keywords = ["vpn", "quic", "privacy"]
categories = ["network-programming"]


[lints]
workspace = true

[dependencies]
serde = { version = "1.0", features = ["derive"] }
etherparse = { workspace = true }
# We don't need many deps here, just types.

[dev-dependencies]
bincode = { workspace = true }
proptest = { workspace = true }

[features]
default = []

