# cargo-deny configuration (Version 2)

[advisories]
version = 2
db-path = "~/.cargo/advisories"
db-urls = ["https://github.com/rustsec/advisory-db"]
# Levels for advisories are now handled via lint levels if needed,
# but vulnerability = "deny" is usually the default.
ignore = [
  "RUSTSEC-2024-0370", # proc-macro-error (tauri dependency)
  "RUSTSEC-2025-0081", # unic-char-property (tauri dependency)
  "RUSTSEC-2025-0075", # unic-char-range (tauri dependency)
  "RUSTSEC-2025-0080", # unic-common (tauri dependency)
  "RUSTSEC-2025-0100", # unic-ucd-ident (tauri dependency)
  "RUSTSEC-2025-0098", # unic-ucd-version (tauri dependency)
  "RUSTSEC-2024-0413", # atk (tauri dependency - GTK3)
  "RUSTSEC-2024-0416", # atk-sys (tauri dependency - GTK3)
  "RUSTSEC-2024-0412", # gdk (tauri dependency - GTK3)
  "RUSTSEC-2024-0418", # gdk-sys (tauri dependency - GTK3)
  "RUSTSEC-2024-0411", # gdkwayland-sys (tauri dependency - GTK3)
  "RUSTSEC-2024-0417", # gdkx11 (tauri dependency - GTK3)
  "RUSTSEC-2024-0414", # gdkx11-sys (tauri dependency - GTK3)
  "RUSTSEC-2024-0415", # gtk (tauri dependency - GTK3)
  "RUSTSEC-2024-0420", # gtk-sys (tauri dependency - GTK3)
  "RUSTSEC-2024-0419", # gtk3-macros (tauri dependency - GTK3)
]

[licenses]
version = 2
# unlicensed = "deny" is now the default behavior if no licenses are allowed
allow = [
  "MIT",
  "Apache-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "CC0-1.0",
  "Zlib",
  "OpenSSL",
  "MPL-2.0",
  "Unicode-DFS-2016",
  "BSL-1.0",
  "Unlicense",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
highlight = "all"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = [
  "https://github.com/zerox80/quinn",
  "https://github.com/zerox80/h3",
  "https://github.com/time-rs/time",
]
