services:
  # Extends the vpn-server defined in the main docker-compose.yml
  vpn-server:
    environment:
      VPN_KEYCLOAK_ENABLED: "true"
      VPN_KEYCLOAK_URL: ${VPN_KEYCLOAK_URL:?VPN_KEYCLOAK_URL is required when Keycloak compose is enabled}
      VPN_KEYCLOAK_REALM: ${VPN_KEYCLOAK_REALM:-mavi-vpn}
      VPN_KEYCLOAK_CLIENT_ID: ${VPN_KEYCLOAK_CLIENT_ID:-mavi-client}
      VPN_KEYCLOAK_REQUIRED_ROLE: ${VPN_KEYCLOAK_REQUIRED_ROLE:-}
      VPN_KEYCLOAK_REQUIRED_SCOPE: ${VPN_KEYCLOAK_REQUIRED_SCOPE:-}

  keycloak-db:
    image: postgres:15
    container_name: keycloak-db
    restart: unless-stopped
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:?KEYCLOAK_DB_PASSWORD is required}

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: keycloak
    restart: unless-stopped
    # --import-realm: on first start (empty DB) Keycloak imports the mounted
    # mavi-vpn-realm.json, creating the `mavi-vpn` realm with the `mavi-client`
    # public PKCE client, the `vpn-user` role, and token lifespans tuned for
    # the VPN refresh cycle (10 min access / 1 h SSO idle / 24 h SSO max).
    # Idempotent: if the realm already exists, the import is skipped on restart.
    command: ["start", "--import-realm"]
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:?KEYCLOAK_DB_PASSWORD is required}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASS:?KEYCLOAK_ADMIN_PASS is required}
      KC_HOSTNAME: auth.${DOMAIN_NAME:?DOMAIN_NAME is required for Keycloak}
      KC_PROXY: edge
      KC_PROXY_HEADERS: xforwarded
    volumes:
      # Realm import: read-only mount. Keycloak reads it on startup when
      # --import-realm is set. Only the first start (empty DB) imports it;
      # subsequent restarts skip the import, so changes here are not picked up
      # by an existing realm. To re-import, drop the keycloak-db volume or use
      # `command: ["start", "--import-realm", "--override"]` once.
      - ./mavi-vpn-realm.json:/opt/keycloak/data/import/mavi-vpn-realm.json:ro
    # Uncomment the following to expose Keycloak internally if using external Nginx manually:
    # ports:
    #   - "127.0.0.1:8080:8080"
    depends_on:
      - keycloak-db
    # Traefik configuration (automatically applied if Traefik is running)
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.keycloak.rule=Host(`auth.${DOMAIN_NAME}`)"
      - "traefik.http.routers.keycloak.entrypoints=web"
      - "traefik.http.services.keycloak.loadbalancer.server.port=8080"
