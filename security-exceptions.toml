# Time-limited RustSec exceptions. The CI validator requires this file and
# deny.toml and .cargo/audit.toml to agree exactly, and rejects entries on or
# after their expiry. Every exception has a named owner and review deadline.
# Replacing GTK3/Tauri dependencies is preferred to extending any exception.

