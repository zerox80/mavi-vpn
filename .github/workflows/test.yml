name: Tests

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: read

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          submodules: recursive
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # stable
        with:
          toolchain: stable
      - name: Cache cargo registry
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            cmake \
            pkg-config \
            libglib2.0-dev \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev
      - name: Test shared crate
        run: cargo test -p shared --verbose
      - name: Test android crate
        run: cargo test -p mavivpn --verbose
      - name: Test backend
        run: cargo test -p mavi-vpn --verbose
      - name: Test linux client
        run: cargo test -p linux-vpn --verbose
      - name: Test quic-tester
        run: cargo test -p quic-tester --verbose
      - name: Setup Node.js for Tauri frontend
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: gui/package-lock.json
      - name: Build Tauri frontend assets
        working-directory: gui
        run: |
          npm ci
          npm run build
      - name: Test GUI backend
        run: cargo test -p mavi-vpn-gui --verbose

  coverage-rust:
    name: Rust Coverage
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          submodules: recursive
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # stable
        with:
          toolchain: stable
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@e28ac56891501ddb0600608470dbe94544964ed4 # cargo-llvm-cov
      - name: Cache cargo registry
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-coverage-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-coverage-
            ${{ runner.os }}-cargo-
      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            cmake \
            pkg-config \
            libglib2.0-dev \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev
      - name: Setup Node.js for Tauri frontend
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: gui/package-lock.json
      - name: Build Tauri frontend assets
        working-directory: gui
        run: |
          npm ci
          npm run build
      - name: Generate Rust coverage summary
        run: |
          mkdir -p target/coverage

          ALL_RUST_PACKAGES="-p shared -p mavivpn -p mavi-vpn -p linux-vpn -p quic-tester -p mavi-vpn-gui"

          cargo llvm-cov --all-features -p shared --summary-only
          cargo llvm-cov --all-features -p mavivpn --summary-only
          cargo llvm-cov --all-features -p mavi-vpn --summary-only
          cargo llvm-cov --all-features -p linux-vpn --summary-only
          cargo llvm-cov --all-features -p quic-tester --summary-only
          cargo llvm-cov --all-features -p mavi-vpn-gui --summary-only

          cargo llvm-cov --all-features $ALL_RUST_PACKAGES --lcov --output-path target/coverage/lcov.info
      - name: Upload Rust coverage
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: rust-coverage
          path: target/coverage/lcov.info

  test-windows:
    name: Windows Unit Tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          submodules: recursive
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # stable
        with:
          toolchain: stable
      - name: Cache cargo registry
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: Test windows crate
        run: cargo test -p windows-vpn --verbose

  coverage-windows:
    name: Windows Rust Coverage
    runs-on: windows-latest
    needs: test-windows
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          submodules: recursive
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # stable
        with:
          toolchain: stable
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@e28ac56891501ddb0600608470dbe94544964ed4 # cargo-llvm-cov
      - name: Cache cargo registry
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-coverage-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-coverage-
            ${{ runner.os }}-cargo-
      - name: Generate Windows Rust coverage summary
        run: |
          New-Item -ItemType Directory -Force -Path target/coverage | Out-Null
          cargo llvm-cov --all-features -p windows-vpn --summary-only
          cargo llvm-cov --all-features -p windows-vpn --lcov --output-path target/coverage/windows-lcov.info
      - name: Upload Windows Rust coverage
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: windows-rust-coverage
          path: target/coverage/windows-lcov.info

  test-gui:
    name: GUI Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gui
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: gui/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run frontend lint
        run: npm run lint
      - name: Run frontend tests
        run: npm test
      - name: Run frontend coverage
        run: npm run test:coverage
      - name: Upload frontend coverage
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: frontend-coverage
          path: gui/coverage/

  test-android-jvm:
    name: Android JVM Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 17
      - name: Validate Gradle Wrapper and configure Gradle
        uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4
      - name: Run Android JVM tests
        run: |
          chmod +x gradlew
          ./gradlew testDebugUnitTest jacocoDebugUnitTestReport
      - name: Upload Android JVM coverage
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: android-jvm-coverage
          path: android/app/build/reports/jacoco/
