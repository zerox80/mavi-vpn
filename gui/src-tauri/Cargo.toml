[package]
name = "mavi-vpn-gui"
version = "0.1.0"
edition = "2021"

[lib]
name = "mavi_vpn_gui_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
shared = { path = "../../shared" }
tauri = { version = "2", features = ["tray-icon"] }
tauri-plugin-shell = "2"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.0", features = ["full"] }
bincode = { package = "bincode-next", version = "3.0.0-rc.2", features = ["serde"] }
anyhow = "1.0"
rand = "0.8"
sha2 = "0.10"
base64 = "0.22"
url = "2"
reqwest = { version = "0.12", features = ["json"] }

[profile.release]
lto = true
codegen-units = 1
panic = "abort"
strip = true
