name: Update forks

# Keeps Cargo.lock on the latest commit of the zerox80 quinn/h3 forks.
# Runs on a schedule and on demand, verifies the workspace still builds, and
# only then commits the refreshed lockfile to main. A broken fork commit fails
# the build step, so the lockfile is never advanced to a state that does not
# compile. On the server you then only need: git pull && docker compose build.

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: write

concurrency:
  group: update-forks
  cancel-in-progress: false

jobs:
  update-forks:
    name: Refresh fork lockfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          submodules: recursive
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # stable
        with:
          toolchain: stable
      - name: Cache cargo registry
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-update-forks-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-update-forks-
            ${{ runner.os }}-cargo-
      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake pkg-config libssl-dev
      - name: Update fork crates in Cargo.lock
        run: |
          cargo update \
            -p quinn -p quinn-proto -p quinn-udp \
            -p h3 -p h3-quinn -p h3-datagram
      - name: Stop if lockfile is unchanged
        id: diff
        run: |
          if git diff --quiet -- Cargo.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Cargo.lock already on the latest fork commits; nothing to do."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Verify the workspace still builds
        if: steps.diff.outputs.changed == 'true'
        run: |
          cargo build --locked \
            -p shared -p mavivpn -p mavi-vpn -p linux-vpn -p quic-tester
      - name: Commit and push refreshed lockfile
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "zerox80"
          git config user.email "rujbin@protonmail.com"
          git add Cargo.lock
          git commit -m "Advance quinn and h3 fork lockfile to latest commits"
          git push origin HEAD:main
